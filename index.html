<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MailBox</title>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d14;--surface:#16161f;--card:#1e1e2e;--border:#2a2a3d;--accent:#e94560;--accent2:#a855f7;--text:#e8e8f0;--muted:#6b6b80;--success:#22c55e;--error:#ef4444}
    body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
    body::before{width:500px;height:500px;background:var(--accent);top:-100px;left:-100px}
    body::after{width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-100px}

    /* AUTH */
    .auth-wrap{width:100%;max-width:420px;padding:20px;position:relative;z-index:1}
    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;box-shadow:0 0 30px rgba(233,69,96,.4)}
    .logo h1{font-size:22px;font-weight:700}
    .logo span{color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .tabs{display:flex;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
    .tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--muted);transition:all .25s}
    .tab.active{background:var(--accent);color:#fff}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
    input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 15px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.15)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 4px 15px rgba(233,69,96,.35)}
    .btn-primary:hover{transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-secondary{background:var(--surface);color:var(--muted);border:1px solid var(--border);margin-top:10px}
    .msg{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
    .msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--success);display:block}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--error);display:block}
    .step{display:none}.step.active{display:block}

    /* APP */
    #app{display:none;width:100vw;height:100vh;flex-direction:row;position:relative;z-index:1}
    #app.show{display:flex}

    /* SIDEBAR */
    .sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
    .user-info{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .avatar{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
    .avatar.sm{width:32px;height:32px;font-size:13px}
    .user-name{font-weight:600;font-size:15px}
    .user-email{font-size:11px;color:var(--muted)}
    .nav-tabs{display:flex;gap:4px}
    .nav-tab{flex:1;padding:7px;text-align:center;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--muted);background:var(--surface);transition:all .2s}
    .nav-tab.active{background:var(--accent);color:#fff}
    .sidebar-body{flex:1;overflow-y:auto;padding:12px}
    .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 8px}
    .user-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .2s;margin-bottom:4px}
    .user-item:hover{background:var(--surface)}
    .user-item.active{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3)}
    .online-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .online-dot.on{background:var(--success)}
    .item-name{font-size:13px;font-weight:600;flex:1}
    .item-sub{font-size:11px;color:var(--muted)}
    .badge{background:var(--accent);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:2px 7px}
    .action-btns{display:flex;gap:6px}
    .btn-sm{padding:5px 10px;font-size:11px;font-weight:600;border:none;border-radius:6px;cursor:pointer;font-family:'Sora',sans-serif}
    .btn-sm.accept{background:var(--success);color:#fff}
    .btn-sm.decline{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .btn-sm.add{background:rgba(233,69,96,.15);color:var(--accent);border:1px solid rgba(233,69,96,.3)}
    .logout-btn{padding:16px;border-top:1px solid var(--border)}
    .logout-btn button{width:100%;padding:9px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;cursor:pointer}

    /* CHAT */
    .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
    .chat-header{padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .chat-header h3{font-size:15px;font-weight:600}
    .chat-header .status{font-size:12px;color:var(--muted)}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
    .empty-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;flex-direction:column;gap:8px}
    .empty-chat .icon{font-size:40px}
    .bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
    .bubble.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .bubble.them{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
    .bubble-time{font-size:10px;opacity:.6;margin-top:4px}
    .chat-input{padding:16px 20px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:10px}
    .chat-input input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 15px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none}
    .chat-input input:focus{border-color:var(--accent)}
    .send-btn{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-weight:600;cursor:pointer}

    /* NOTIFICATION */
    .notif{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:13px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:slideIn .3s ease;max-width:280px}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    .notif-title{font-weight:700;margin-bottom:4px;color:var(--accent)}

    @media(max-width:600px){
      .sidebar{width:100%;position:fixed;bottom:0;left:0;height:60%;z-index:10;display:none}
      .sidebar.show-mobile{display:flex}
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authSection" class="auth-wrap">
  <div class="logo">
    <div class="logo-icon">✉️</div>
    <h1>Mail<span>Box</span></h1>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
      <div class="tab" onclick="switchTab('register')">Đăng ký</div>
    </div>
    <div id="loginForm" class="step active">
      <div id="loginMsg" class="msg"></div>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="ban@gmail.com"/></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary" onclick="doLogin()">Đăng nhập</button>
    </div>
    <div id="registerForm" class="step">
      <div id="registerMsg" class="msg"></div>
      <div class="form-group"><label>Họ tên</label><input type="text" id="regName" placeholder="Nguyễn Văn A"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="ban@gmail.com"/></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="regPass" placeholder="Tối thiểu 6 ký tự"/></div>
      <button class="btn btn-primary" id="sendOtpBtn" onclick="sendOTP()">Gửi mã OTP</button>
    </div>
    <div id="otpForm" class="step">
      <div id="otpMsg" class="msg"></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">OTP đã gửi đến <strong id="sentToEmail" style="color:var(--text)"></strong></p>
      <div class="form-group"><label>Mã OTP</label><input type="text" id="otpInput" maxlength="6" placeholder="000000" onkeydown="if(event.key==='Enter')verifyOTP()"/></div>
      <button class="btn btn-primary" onclick="verifyOTP()">Xác thực</button>
      <button class="btn btn-secondary" onclick="backToRegister()">← Quay lại</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="user-info">
        <div class="avatar" id="myAvatar"></div>
        <div><div class="user-name" id="myName"></div><div class="user-email" id="myEmail"></div></div>
      </div>
      <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchNav('friends')">Bạn bè</div>
        <div class="nav-tab" onclick="switchNav('users')">Mọi người</div>
        <div class="nav-tab" onclick="switchNav('requests')" id="reqTab">Lời mời</div>
      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
    <div class="logout-btn"><button onclick="doLogout()">Đăng xuất</button></div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatHeader">
      <div class="empty-chat" style="flex:1;flex-direction:row;justify-content:flex-start">
        <span style="color:var(--muted);font-size:14px">Chọn bạn bè để bắt đầu chat</span>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat">
        <div class="icon">💬</div>
        <div>Chọn một người bạn để nhắn tin</div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter')sendMessage()"/>
      <button class="send-btn" onclick="sendMessage()">Gửi</button>
    </div>
  </div>
</div>

<script>
  let currentUser = null;
  let socket = null;
  let currentChat = null;
  let currentNav = 'friends';
  let pendingEmail = '';
  let allUsers = [];
  let friendsData = { friends: [], sent: [], received: [] };
  let reqCount = 0;

  // ── AUTH ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    showStep(tab==='login'?'loginForm':'registerForm');
    clearMsgs();
  }
  function showStep(id) { document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function showMsg(id, type, text) { const el=document.getElementById(id); el.className=`msg ${type}`; el.textContent=text; }
  function clearMsgs() { document.querySelectorAll('.msg').forEach(m=>{m.className='msg';m.textContent=''}); }

  async function doLogin() {
    const email=document.getElementById('loginEmail').value.trim();
    const password=document.getElementById('loginPass').value;
    if(!email||!password) return showMsg('loginMsg','error','Điền đầy đủ thông tin.');
    const res=await post('/api/login',{email,password});
    if(res.success) initApp();
    else showMsg('loginMsg','error',res.message);
  }

  async function sendOTP() {
    const name=document.getElementById('regName').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const password=document.getElementById('regPass').value;
    if(!name||!email||!password) return showMsg('registerMsg','error','Điền đầy đủ thông tin.');
    if(password.length<6) return showMsg('registerMsg','error','Mật khẩu tối thiểu 6 ký tự.');
    const btn=document.getElementById('sendOtpBtn');
    btn.disabled=true; btn.textContent='Đang gửi...';
    const res=await post('/api/register/send-otp',{name,email,password});
    btn.disabled=false; btn.textContent='Gửi mã OTP';
    if(res.success){ pendingEmail=email; document.getElementById('sentToEmail').textContent=email; showStep('otpForm'); showMsg('otpMsg','success',res.message); }
    else showMsg('registerMsg','error',res.message);
  }

  async function verifyOTP() {
    const otp=document.getElementById('otpInput').value.trim();
    if(otp.length!==6) return showMsg('otpMsg','error','Mã OTP phải 6 chữ số.');
    const res=await post('/api/register/verify-otp',{email:pendingEmail,otp});
    if(res.success) initApp();
    else showMsg('otpMsg','error',res.message);
  }

  function backToRegister() { showStep('registerForm'); clearMsgs(); }

  async function doLogout() {
    await post('/api/logout',{});
    if(socket) socket.disconnect();
    socket=null; currentUser=null; currentChat=null;
    document.getElementById('app').classList.remove('show');
    document.getElementById('authSection').style.display='flex';
    switchTab('login');
  }

  // ── APP INIT ──
  async function initApp() {
    const me = await fetch('/api/me').then(r=>r.json());
    if(!me.loggedIn) return;
    currentUser = me.user;
    document.getElementById('authSection').style.display='none';
    document.getElementById('app').classList.add('show');
    document.getElementById('myName').textContent=currentUser.name;
    document.getElementById('myEmail').textContent=currentUser.email;
    document.getElementById('myAvatar').textContent=currentUser.name.charAt(0).toUpperCase();
    initSocket();
    await loadData();
    renderSidebar();
  }

  function initSocket() {
    socket = io();
    socket.on('friend_request', ({from, name}) => {
      showNotif('Lời mời kết bạn', `${name} muốn kết bạn với bạn`);
      loadData().then(renderSidebar);
    });
    socket.on('friend_accepted', ({from, name}) => {
      showNotif('Kết bạn thành công! 🎉', `${name} đã chấp nhận lời mời của bạn`);
      loadData().then(renderSidebar);
    });
    socket.on('new_message', ({from, text, time}) => {
      if(currentChat === from) appendMessage(from, text, time, false);
      else showNotif('Tin nhắn mới', `${from}: ${text}`);
    });
    socket.on('user_online', () => { loadData().then(renderSidebar); });
    socket.on('user_offline', () => { loadData().then(renderSidebar); });
  }

  async function loadData() {
    const [usersRes, friendsRes] = await Promise.all([
      fetch('/api/users').then(r=>r.json()),
      fetch('/api/friends').then(r=>r.json()),
    ]);
    allUsers = usersRes.users || [];
    friendsData = friendsRes;
    reqCount = (friendsData.received||[]).length;
    const reqTab = document.getElementById('reqTab');
    reqTab.innerHTML = reqCount > 0 ? `Lời mời <span class="badge">${reqCount}</span>` : 'Lời mời';
  }

  // ── SIDEBAR ──
  function switchNav(nav) {
    currentNav = nav;
    document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['friends','users','requests'][i]===nav));
    renderSidebar();
  }

  function renderSidebar() {
    const body = document.getElementById('sidebarBody');
    body.innerHTML = '';
    if(currentNav === 'friends') renderFriends(body);
    else if(currentNav === 'users') renderUsers(body);
    else renderRequests(body);
  }

  function renderFriends(body) {
    const friends = friendsData.friends || [];
    if(friends.length === 0) { body.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:30px">Chưa có bạn bè nào</div>'; return; }
    const title = document.createElement('div'); title.className='section-title'; title.textContent='Bạn bè'; body.appendChild(title);
    friends.forEach(f => {
      const el = document.createElement('div');
      el.className = 'user-item' + (currentChat===f.email?' active':'');
      el.onclick = () => openChat(f.email, f.name, f.online);
      el.innerHTML = `<div class="avatar sm">${f.name.charAt(0).toUpperCase()}</div><div style="flex:1"><div class="item-name">${f.name}</div><div class="item-sub">${f.online?'🟢 Online':'⚫ Offline'}</div></div>`;
      body.appendChild(el);
    });
  }

  function renderUsers(body) {
    const myFriendEmails = (friendsData.friends||[]).map(f=>f.email);
    const mySent = (friendsData.sent||[]).map(f=>f.email);
    const others = allUsers.filter(u => u.email !== currentUser.email);
    if(others.length === 0) { body.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:30px">Không có người dùng nào</div>'; return; }
    const title = document.createElement('div'); title.className='section-title'; title.textContent='Mọi người'; body.appendChild(title);
    others.forEach(u => {
      const isFriend = myFriendEmails.includes(u.email);
      const isSent = mySent.includes(u.email);
      const el = document.createElement('div'); el.className='user-item';
      el.innerHTML = `<div class="avatar sm">${u.name.charAt(0).toUpperCase()}</div><div style="flex:1"><div class="item-name">${u.name}</div><div class="item-sub">${u.online?'🟢 Online':'⚫ Offline'}</div></div>${isFriend?'<span style="font-size:11px;color:var(--success)">Bạn bè</span>':isSent?'<span style="font-size:11px;color:var(--muted)">Đã gửi</span>':`<button class="btn-sm add" onclick="sendRequest('${u.email}',event)">+ Kết bạn</button>`}`;
      body.appendChild(el);
    });
  }

  function renderRequests(body) {
    const received = friendsData.received || [];
    if(received.length === 0) { body.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:30px">Không có lời mời nào</div>'; return; }
    const title = document.createElement('div'); title.className='section-title'; title.textContent='Lời mời nhận được'; body.appendChild(title);
    received.forEach(f => {
      const el = document.createElement('div'); el.className='user-item';
      el.innerHTML = `<div class="avatar sm">${f.name.charAt(0).toUpperCase()}</div><div style="flex:1"><div class="item-name">${f.name}</div><div class="item-sub">${f.email}</div></div><div class="action-btns"><button class="btn-sm accept" onclick="acceptRequest('${f.email}',event)">✓</button><button class="btn-sm decline" onclick="declineRequest('${f.email}',event)">✗</button></div>`;
      body.appendChild(el);
    });
  }

  // ── FRIEND ACTIONS ──
  async function sendRequest(email, e) {
    e.stopPropagation();
    await post('/api/friends/request', { to: email });
    await loadData(); renderSidebar();
  }

  async function acceptRequest(email, e) {
    e.stopPropagation();
    await post('/api/friends/accept', { from: email });
    await loadData(); renderSidebar();
  }

  async function declineRequest(email, e) {
    e.stopPropagation();
    await post('/api/friends/decline', { from: email });
    await loadData(); renderSidebar();
  }

  // ── CHAT ──
  async function openChat(email, name, online) {
    currentChat = email;
    document.getElementById('chatHeader').innerHTML = `<div class="avatar sm">${name.charAt(0).toUpperCase()}</div><div><div class="chat-header" style="font-size:15px;font-weight:600;padding:0;border:none;background:none">${name}</div><div class="status">${online?'🟢 Online':'⚫ Offline'}</div></div>`;
    const res = await fetch(`/api/messages/${email}`).then(r=>r.json());
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '';
    if(!res.messages || res.messages.length===0) {
      msgs.innerHTML='<div class="empty-chat"><div class="icon">👋</div><div>Bắt đầu cuộc trò chuyện!</div></div>';
    } else {
      res.messages.forEach(m => appendMessage(m.from, m.text, m.time, m.from===currentUser.email));
    }
    msgs.scrollTop = msgs.scrollHeight;
    renderSidebar();
  }

  function appendMessage(from, text, time, isMe) {
    const msgs = document.getElementById('chatMessages');
    const empty = msgs.querySelector('.empty-chat');
    if(empty) empty.remove();
    const div = document.createElement('div');
    div.className = `bubble ${isMe||from===currentUser.email?'me':'them'}`;
    const t = new Date(time);
    div.innerHTML = `${text}<div class="bubble-time">${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text || !currentChat) return;
    socket.emit('send_message', { to: currentChat, text });
    input.value = '';
  }

  // ── NOTIFICATION ──
  function showNotif(title, body) {
    const el = document.createElement('div');
    el.className = 'notif';
    el.innerHTML = `<div class="notif-title">${title}</div><div>${body}</div>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── HELPERS ──
  async function post(url, data) {
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    return r.json();
  }

  async function checkSession() {
    const res = await fetch('/api/me').then(r=>r.json());
    if(res.loggedIn) initApp();
  }

  checkSession();
</script>
</body>
</html>
